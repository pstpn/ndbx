services:
  backend:
    image: backend-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-app
    ports:
      - "${APP_PORT}:${APP_PORT}"
      - "${PPROF_PORT}:${PPROF_PORT}"
    depends_on:
      redis:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      mongos:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      neo4j:
        condition: service_healthy
    networks:
      - backend-network
    restart: no
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:${APP_PORT}/health"]
      interval: 10s
      timeout: 2s
      retries: 5

  redis:
    image: redis:8.6.1-alpine
    container_name: redis
    command:
      - sh
      - -c
      - |
        if [ -z "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes
        else
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        fi
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -z "$$REDIS_PASSWORD" ]; then
            redis-cli ping | grep -q PONG
          else
            redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
          fi
      interval: 5s
      timeout: 2s
      retries: 10

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    environment:
      - CASSANDRA_BROADCAST_ADDRESS=cassandra
      - CASSANDRA_START_RPC=false
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
      - CASSANDRA_ENABLE_USER_DEFINED_FUNCTIONS=true
    ports:
      - "${CASSANDRA_PORT}:${CASSANDRA_PORT}"
    volumes:
      - cassandra-data:/var/lib/cassandra
      - ./scripts/cassandra:/scripts/cassandra:ro
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cqlsh cassandra ${CASSANDRA_PORT} -e 'DESCRIBE KEYSPACES' && exit 0 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20

  cassandra-init:
    image: cassandra:4.1
    container_name: cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - backend-network
    restart: "no"
    volumes:
      - ./scripts/cassandra:/scripts/cassandra:ro
    environment:
      - CASSANDRA_HOST=cassandra
      - CASSANDRA_PORT=${CASSANDRA_PORT}
      - CASSANDRA_KEYSPACE=${CASSANDRA_KEYSPACE}
    command: /scripts/cassandra/init.sh

  configsvr1:
    image: mongo:8.0.0
    container_name: configsvr1
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--bind_ip_all", "--port", "${MONGODB_PORT}"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-configsvr1:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "${MONGODB_PORT}", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  configsvr2:
    image: mongo:8.0.0
    container_name: configsvr2
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--bind_ip_all", "--port", "${MONGODB_PORT}"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-configsvr2:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "${MONGODB_PORT}", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  configsvr3:
    image: mongo:8.0.0
    container_name: configsvr3
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--bind_ip_all", "--port", "${MONGODB_PORT}"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-configsvr3:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "${MONGODB_PORT}", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  shard1-1:
    image: mongo:8.0.0
    container_name: shard1-1
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--bind_ip_all", "--port", "${MONGODB_PORT}"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-shard1-1:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "${MONGODB_PORT}", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  shard1-2:
    image: mongo:8.0.0
    container_name: shard1-2
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--bind_ip_all", "--port", "${MONGODB_PORT}"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-shard1-2:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "${MONGODB_PORT}", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  shard1-3:
    image: mongo:8.0.0
    container_name: shard1-3
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--bind_ip_all", "--port", "${MONGODB_PORT}"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-shard1-3:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "${MONGODB_PORT}", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  shard2-1:
    image: mongo:8.0.0
    container_name: shard2-1
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--bind_ip_all", "--port", "${MONGODB_PORT}"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-shard2-1:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "${MONGODB_PORT}", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  shard2-2:
    image: mongo:8.0.0
    container_name: shard2-2
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--bind_ip_all", "--port", "${MONGODB_PORT}"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-shard2-2:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "${MONGODB_PORT}", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  shard2-3:
    image: mongo:8.0.0
    container_name: shard2-3
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--bind_ip_all", "--port", "${MONGODB_PORT}"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-shard2-3:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "${MONGODB_PORT}", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  mongos:
    image: mongo:8.0.0
    container_name: mongos
    command: ["mongos", "--configdb", "cfgRS/configsvr1:${MONGODB_PORT},configsvr2:${MONGODB_PORT},configsvr3:${MONGODB_PORT}", "--bind_ip_all", "--port", "${MONGODB_PORT}"]
    ports:
      - "${MONGODB_PORT}:${MONGODB_PORT}"
    depends_on:
      configsvr1:
        condition: service_healthy
      configsvr2:
        condition: service_healthy
      configsvr3:
        condition: service_healthy
      shard1-1:
        condition: service_healthy
      shard1-2:
        condition: service_healthy
      shard1-3:
        condition: service_healthy
      shard2-1:
        condition: service_healthy
      shard2-2:
        condition: service_healthy
      shard2-3:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--port", "${MONGODB_PORT}", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 20

  mongo-init:
    image: mongo:8.0.0
    container_name: mongo-init
    depends_on:
      configsvr1:
        condition: service_healthy
      configsvr2:
        condition: service_healthy
      configsvr3:
        condition: service_healthy
      shard1-1:
        condition: service_healthy
      shard1-2:
        condition: service_healthy
      shard1-3:
        condition: service_healthy
      shard2-1:
        condition: service_healthy
      shard2-2:
        condition: service_healthy
      shard2-3:
        condition: service_healthy
      mongos:
        condition: service_started
    networks:
      - backend-network
    restart: "no"
    environment:
      MONGODB_DATABASE: ${MONGODB_DATABASE}
    command:
      - sh
      - -c
      - |
        set -eu

        wait_mongo() {
          host="$$1"
          port="$$2"

          echo "Waiting for $${host}:$${port}..."
          until mongosh --host "$${host}" --port "$${port}" --quiet --eval 'db.adminCommand({ ping: 1 }).ok' >/dev/null 2>&1; do
            sleep 2
          done
        }

        init_rs() {
          host="$$1"
          port="$$2"
          replset="$$3"
          members_json="$$4"

          mongosh --host "$${host}" --port "$${port}" --quiet --eval "
            try {
              rs.status().ok;
              print('Replica set $${replset} already initialized');
            } catch (e) {
              print('Initializing replica set $${replset}');
              rs.initiate({ _id: '$${replset}', members: $${members_json} });
            }
          "

          until mongosh --host "$${host}" --port "$${port}" --quiet --eval "db.hello().isWritablePrimary || db.hello().secondary" | grep -q 'true'; do
            sleep 2
          done
        }

        wait_mongo configsvr1 ${MONGODB_PORT}
        wait_mongo configsvr2 ${MONGODB_PORT}
        wait_mongo configsvr3 ${MONGODB_PORT}
        wait_mongo shard1-1 ${MONGODB_PORT}
        wait_mongo shard1-2 ${MONGODB_PORT}
        wait_mongo shard1-3 ${MONGODB_PORT}
        wait_mongo shard2-1 ${MONGODB_PORT}
        wait_mongo shard2-2 ${MONGODB_PORT}
        wait_mongo shard2-3 ${MONGODB_PORT}

        init_rs configsvr1 ${MONGODB_PORT} cfgRS "[
          { _id: 0, host: 'configsvr1:${MONGODB_PORT}' },
          { _id: 1, host: 'configsvr2:${MONGODB_PORT}' },
          { _id: 2, host: 'configsvr3:${MONGODB_PORT}' }
        ]"

        init_rs shard1-1 ${MONGODB_PORT} shard1RS "[
          { _id: 0, host: 'shard1-1:${MONGODB_PORT}' },
          { _id: 1, host: 'shard1-2:${MONGODB_PORT}' },
          { _id: 2, host: 'shard1-3:${MONGODB_PORT}' }
        ]"

        init_rs shard2-1 ${MONGODB_PORT} shard2RS "[
          { _id: 0, host: 'shard2-1:${MONGODB_PORT}' },
          { _id: 1, host: 'shard2-2:${MONGODB_PORT}' },
          { _id: 2, host: 'shard2-3:${MONGODB_PORT}' }
        ]"

        wait_mongo mongos ${MONGODB_PORT}

        mongosh --host mongos --port ${MONGODB_PORT} --quiet --eval "
          try { sh.addShard('shard1RS/shard1-1:${MONGODB_PORT},shard1-2:${MONGODB_PORT},shard1-3:${MONGODB_PORT}'); } catch (e) { print(e); }
          try { sh.addShard('shard2RS/shard2-1:${MONGODB_PORT},shard2-2:${MONGODB_PORT},shard2-3:${MONGODB_PORT}'); } catch (e) { print(e); }
          try { sh.enableSharding('$${MONGODB_DATABASE}'); } catch (e) { print(e); }
          try { sh.shardCollection('$${MONGODB_DATABASE}.events', { created_by: 'hashed' }); } catch (e) { print(e); }
        "

        echo "Mongo cluster initialized"

  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    ports:
      - "7687:7687"
      - "7474:7474"
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  backend-network:
    name: backend-network
    driver: bridge

volumes:
  redis-data:
  cassandra-data:
  neo4j-data:
  mongo-configsvr1:
  mongo-configsvr2:
  mongo-configsvr3:
  mongo-shard1-1:
  mongo-shard1-2:
  mongo-shard1-3:
  mongo-shard2-1:
  mongo-shard2-2:
  mongo-shard2-3: