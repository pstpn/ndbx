services:
  backend:
    image: backend-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-app
    ports:
      - "8080:${APP_PORT}"
      - "6060:${PPROF_PORT}"
    networks:
      - backend-network
    restart: no
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 2s
      retries: 5

networks:
  backend-network:
    name: backend-network
    driver: bridge