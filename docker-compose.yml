services:
  backend:
    image: backend-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-app
    ports:
      - "${APP_PORT}:${APP_PORT}"
      - "${PPROF_PORT}:${PPROF_PORT}"
    depends_on:
      redis:
        condition: service_healthy
      mongos:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    networks:
      - backend-network
    restart: no
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:${APP_PORT}/health"]
      interval: 10s
      timeout: 2s
      retries: 5

  redis:
    image: redis:8.6.1-alpine
    container_name: redis
    command:
      - sh
      - -c
      - |
        if [ -z "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes
        else
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        fi
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -z "$$REDIS_PASSWORD" ]; then
            redis-cli ping | grep -q PONG
          else
            redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
          fi
      interval: 5s
      timeout: 2s
      retries: 10

  configsvr1:
    image: mongo:8.0.0
    container_name: configsvr1
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--bind_ip_all", "--port", "27019"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-configsvr1:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  configsvr2:
    image: mongo:8.0.0
    container_name: configsvr2
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--bind_ip_all", "--port", "27019"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-configsvr2:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  configsvr3:
    image: mongo:8.0.0
    container_name: configsvr3
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--bind_ip_all", "--port", "27019"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-configsvr3:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  shard1-1:
    image: mongo:8.0.0
    container_name: shard1-1
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--bind_ip_all", "--port", "27018"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-shard1-1:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  shard1-2:
    image: mongo:8.0.0
    container_name: shard1-2
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--bind_ip_all", "--port", "27018"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-shard1-2:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  shard1-3:
    image: mongo:8.0.0
    container_name: shard1-3
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--bind_ip_all", "--port", "27018"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-shard1-3:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  shard2-1:
    image: mongo:8.0.0
    container_name: shard2-1
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--bind_ip_all", "--port", "27018"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-shard2-1:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  shard2-2:
    image: mongo:8.0.0
    container_name: shard2-2
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--bind_ip_all", "--port", "27018"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-shard2-2:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  shard2-3:
    image: mongo:8.0.0
    container_name: shard2-3
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--bind_ip_all", "--port", "27018"]
    networks:
      - backend-network
    restart: unless-stopped
    volumes:
      - mongo-shard2-3:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 10

  mongos:
    image: mongo:8.0.0
    container_name: mongos
    command: ["mongos", "--configdb", "cfgRS/configsvr1:27019,configsvr2:27019,configsvr3:27019", "--bind_ip_all", "--port", "27017"]
    ports:
      - "${MONGODB_PORT}:27017"
    depends_on:
      configsvr1:
        condition: service_healthy
      configsvr2:
        condition: service_healthy
      configsvr3:
        condition: service_healthy
      shard1-1:
        condition: service_healthy
      shard1-2:
        condition: service_healthy
      shard1-3:
        condition: service_healthy
      shard2-1:
        condition: service_healthy
      shard2-2:
        condition: service_healthy
      shard2-3:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27017", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 2s
      retries: 20

  mongo-init:
    image: mongo:8.0.0
    container_name: mongo-init
    depends_on:
      configsvr1:
        condition: service_healthy
      configsvr2:
        condition: service_healthy
      configsvr3:
        condition: service_healthy
      shard1-1:
        condition: service_healthy
      shard1-2:
        condition: service_healthy
      shard1-3:
        condition: service_healthy
      shard2-1:
        condition: service_healthy
      shard2-2:
        condition: service_healthy
      shard2-3:
        condition: service_healthy
      mongos:
        condition: service_started
    networks:
      - backend-network
    restart: "no"
    environment:
      MONGODB_DATABASE: ${MONGODB_DATABASE}
    command:
      - sh
      - -c
      - |
        set -eu

        wait_mongo() {
          host="$$1"
          port="$$2"

          echo "Waiting for $${host}:$${port}..."
          until mongosh --host "$${host}" --port "$${port}" --quiet --eval 'db.adminCommand({ ping: 1 }).ok' >/dev/null 2>&1; do
            sleep 2
          done
        }

        init_rs() {
          host="$$1"
          port="$$2"
          replset="$$3"
          members_json="$$4"

          mongosh --host "$${host}" --port "$${port}" --quiet --eval "
            try {
              rs.status().ok;
              print('Replica set $${replset} already initialized');
            } catch (e) {
              print('Initializing replica set $${replset}');
              rs.initiate({ _id: '$${replset}', members: $${members_json} });
            }
          "

          until mongosh --host "$${host}" --port "$${port}" --quiet --eval "db.hello().isWritablePrimary || db.hello().secondary" | grep -q 'true'; do
            sleep 2
          done
        }

        wait_mongo configsvr1 27019
        wait_mongo configsvr2 27019
        wait_mongo configsvr3 27019
        wait_mongo shard1-1 27018
        wait_mongo shard1-2 27018
        wait_mongo shard1-3 27018
        wait_mongo shard2-1 27018
        wait_mongo shard2-2 27018
        wait_mongo shard2-3 27018

        init_rs configsvr1 27019 cfgRS "[
          { _id: 0, host: 'configsvr1:27019' },
          { _id: 1, host: 'configsvr2:27019' },
          { _id: 2, host: 'configsvr3:27019' }
        ]"

        init_rs shard1-1 27018 shard1RS "[
          { _id: 0, host: 'shard1-1:27018' },
          { _id: 1, host: 'shard1-2:27018' },
          { _id: 2, host: 'shard1-3:27018' }
        ]"

        init_rs shard2-1 27018 shard2RS "[
          { _id: 0, host: 'shard2-1:27018' },
          { _id: 1, host: 'shard2-2:27018' },
          { _id: 2, host: 'shard2-3:27018' }
        ]"

        wait_mongo mongos 27017

        mongosh --host mongos --port 27017 --quiet --eval "
          try { sh.addShard('shard1RS/shard1-1:27018,shard1-2:27018,shard1-3:27018'); } catch (e) { print(e); }
          try { sh.addShard('shard2RS/shard2-1:27018,shard2-2:27018,shard2-3:27018'); } catch (e) { print(e); }
          try { sh.enableSharding('$${MONGODB_DATABASE}'); } catch (e) { print(e); }
          try { sh.shardCollection('$${MONGODB_DATABASE}.events', { created_by: 'hashed' }); } catch (e) { print(e); }
        "

        echo "Mongo cluster initialized"
networks:
  backend-network:
    name: backend-network
    driver: bridge

volumes:
  redis-data:
  mongo-configsvr1:
  mongo-configsvr2:
  mongo-configsvr3:
  mongo-shard1-1:
  mongo-shard1-2:
  mongo-shard1-3:
  mongo-shard2-1:
  mongo-shard2-2:
  mongo-shard2-3: