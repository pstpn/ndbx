openapi: 3.0.0
info:
  title: ndbx-service
  version: 0.0.0
tags: []
paths:
  /api/ping:
    get:
      operationId: Api_ping
      summary: ping
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            text/plain:
              schema:
                type: string
  /api/session:
    post:
      operationId: Api_session
      summary: create or extend user's session
      parameters:
        - $ref: '#/components/parameters/SessionRequest'
      responses:
        '200':
          description: The request has succeeded.
          headers:
            Set-Cookie:
              required: true
              schema:
                type: string
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          headers:
            Set-Cookie:
              required: true
              schema:
                type: string
components:
  parameters:
    SessionRequest:
      name: Cookie
      in: header
      required: false
      schema:
        type: string
servers:
  - url: http://localhost:8080
    description: localhost
    variables: {}
